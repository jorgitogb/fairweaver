source_format: schema_org
pivot: fairagro_searchhub
version: "1.0.0"
author: fairweaver-community
description: Maps Schema.org JSON-LD to ARC RO-Crate Investigation fields

field_rules:
  - source: "name"
    target: "name"
    required: true
    confidence: 0.95

  - source: "description"
    target: "description"
    required: true
    confidence: 0.95

  - source: "identifier"
    target: "identifier"
    required: true
    confidence: 0.9

  - source: "creator"
    target: "creator"
    required: true
    confidence: 0.85

  - source: "datePublished"
    target: "datePublished"
    required: false
    confidence: 0.8

  - source: "license"
    target: "license"
    required: false
    confidence: 0.9

  - source: "keywords"
    target: "keywords"
    required: false
    confidence: 0.8

  - source: "publisher"
    target: "publisher"
    required: false
    confidence: 0.7

  - source: "url"
    target: "url"
    required: false
    confidence: 0.7

  - source: "inLanguage"
    target: "inLanguage"
    required: false
    confidence: 0.7

  - source: "version"
    target: "version"
    required: false
    confidence: 0.7
