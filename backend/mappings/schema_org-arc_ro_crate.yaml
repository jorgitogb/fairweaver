source_format: schema_org
pivot: fairagro_searchhub
version: "1.0.0"
author: fairweaver-community
description: Maps Schema.org JSON-LD to FAIRagro Search Hub format

field_rules:
  # citation block (required fields)
  - source: "name"
    target: "citation.title"
    block: citation
    required: true
    confidence: 0.9

  - source: "description"
    target: "citation.dsDescription"
    block: citation
    required: true
    confidence: 0.9

  - source: "creator"
    target: "citation.author"
    block: citation
    required: true
    confidence: 0.85
    transform: parse_schema_org_person

  - source: "identifier"
    target: "citation.otherId"
    block: citation
    required: true
    confidence: 0.9

  # generalExtended block (recommended fields)
  - source: "license"
    target: "generalExtended.license"
    block: generalExtended
    required: false
    confidence: 0.8

  - source: "url"
    target: "generalExtended.sourceDatasetURI"
    block: generalExtended
    required: false
    confidence: 0.7

  # Additional metadata
  - source: "keywords"
    target: "generalExtended.sourceRDI"
    block: generalExtended
    required: false
    confidence: 0.6

  - source: "datePublished"
    target: "citation.productionDate"
    block: citation
    required: false
    confidence: 0.6

  - source: "publisher"
    target: "citation.publisher"
    block: citation
    required: false
    confidence: 0.6

  - source: "inLanguage"
    target: "citation.language"
    block: citation
    required: false
    confidence: 0.6
