source_format: ro_crate
pivot: fairagro_searchhub
version: "0.2.0"
author: fairweaver-community
description: Maps ARC RO-Crate metadata to FAIRagro Search Hub format

field_rules:
  # ── citation block ─────────────────────────────────────────────
  - source: name
    target: citation.title
    block: citation
    required: true
    confidence: 0.95

  - source: alternative_titles
    target: citation.alternativeTitle
    block: citation
    required: false
    confidence: 0.8

  - source: description
    target: citation.dsDescription
    block: citation
    required: true
    confidence: 0.9
    transform: wrap_description

  - source: creator
    target: citation.author
    block: citation
    required: true
    confidence: 0.85
    transform: parse_person

  - source: identifier
    target: citation.otherId
    block: citation
    required: true
    confidence: 0.9
    transform: wrap_other_id

  - source: datePublished
    target: citation.productionDate
    block: citation
    required: false
    confidence: 0.8

  - source: subject
    target: citation.subject
    block: citation
    required: false
    confidence: 0.9

  - source: keywords
    target: citation.keywords
    block: citation
    required: false
    confidence: 0.8

  # ── generalExtended block ───────────────────────────────────────
  - source: license
    target: generalExtended.license
    block: generalExtended
    required: false
    confidence: 0.9

  - source: "@id"
    target: generalExtended.sourceDatasetURI
    block: generalExtended
    required: false
    confidence: 0.8

  # ── crop block ────────────────────────────────────────────────
  - source: crop_species
    target: crop.crop.cropSpecies
    block: crop
    required: false
    confidence: 0.85

  - source: crop_species_uri
    target: crop.crop.cropSpeciesURI
    block: crop
    required: false
    confidence: 0.8

  - source: crop_pest
    target: crop.crop.cropPest
    block: crop
    required: false
    confidence: 0.75

  - source: crop_pest_uri
    target: crop.crop.cropPestURI
    block: crop
    required: false
    confidence: 0.75

  - source: crop_infection_label
    target: crop.crop.infectionLabel
    block: crop
    required: false
    confidence: 0.7

  - source: crop_variety
    target: crop.crop.variety
    block: crop
    required: false
    confidence: 0.7

  - source: crop_grain_weight
    target: crop.crop.grainWeight
    block: crop
    required: false
    confidence: 0.65

  - source: crop_icc_code
    target: crop.crop.iccCode
    block: crop
    required: false
    confidence: 0.6

  # ── sensor block ─────────────────────────────────────────────
  - source: measurementTechnique
    target: sensor.sensor.sensorType
    block: sensor
    required: false
    confidence: 0.85
    transform: wrap_sensor_type

  - source: measurementMethod
    target: sensor.sensor.sensorPlatformType
    block: sensor
    required: false
    confidence: 0.8
    transform: wrap_sensor_type

  - source: drone_manufacturer
    target: sensor.sensor.sensorPlatformManufacturerName
    block: sensor
    required: false
    confidence: 0.7

  - source: drone_model
    target: sensor.sensor.sensorPlatformModelName
    block: sensor
    required: false
    confidence: 0.7

  # ── location block ───────────────────────────────────────────
  - source: drone_longitude
    target: location.location.longitude
    block: location
    required: false
    confidence: 0.7

  - source: drone_latitude
    target: location.location.latitude
    block: location
    required: false
    confidence: 0.7

  - source: drone_datetime
    target: location.location.dateTime
    block: location
    required: false
    confidence: 0.65

  # ── geographicCoverage block ─────────────────────────────────
  - source: geo_country
    target: geographicCoverage.country
    block: geographicCoverage
    required: false
    confidence: 0.8

  - source: geo_state
    target: geographicCoverage.state
    block: geographicCoverage
    required: false
    confidence: 0.75

  - source: geo_county
    target: geographicCoverage.county
    block: geographicCoverage
    required: false
    confidence: 0.7

  # ── soil block ───────────────────────────────────────────────
  - source: soil_depths
    target: soil.soilLayer
    block: soil
    required: false
    confidence: 0.65

  # ── process block ────────────────────────────────────────────
  - source: agricultural_processes
    target: process.processType
    block: process
    required: false
    confidence: 0.6
