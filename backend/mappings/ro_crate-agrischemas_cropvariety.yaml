source_format: ro_crate
pivot: agrischemas_cropvariety
version: "0.1.0"
author: fairweaver-community
description: Maps ARC RO-Crate metadata to AgroSchemas CropVariety profile

field_rules:
  - source: crop_species
    target: crop
    required: true
    confidence: 0.95
    transform: null

  - source: identifier
    target: identifier
    required: true
    confidence: 0.95
    transform: null

  - source: name
    target: name
    required: true
    confidence: 0.95
    transform: null

  - source: crop_species_uri
    target: cropUri
    required: false
    confidence: 0.85
    transform: null

  - source: creator
    target: breeder
    required: false
    confidence: 0.6
    transform: parse_person
    note: "creator used as proxy for breeder information"

  - source: crop_pest
    target: traits
    required: false
    confidence: 0.6
    transform: null
    note: "crop pest data used as proxy for trait information"

  - source: license
    target: license
    required: false
    confidence: 0.9
    transform: null
