services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PIVOT_REGISTRY_PATH=/app/pivot_registry.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://chat-ai.academiccloud.de/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-meta-llama-3.1-8b-instruct}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./backend/mappings:/app/mappings
    restart: unless-stopped